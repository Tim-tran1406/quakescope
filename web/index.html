<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuakeScope — live earthquake map</title>

  <!-- Leaflet: the free map library (loaded from its public CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Helvetica, Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }

    /* Top header bar */
    #bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(32,33,36,0.92); color: #fff; padding: 10px 16px;
      display: flex; align-items: center; gap: 16px;
    }
    #bar h1 { font-size: 17px; margin: 0; }
    #bar .sub { font-size: 12px; color: #bdc1c6; }
    #bar .controls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    #bar button {
      background: #3c4043; color: #fff; border: 1px solid #5f6368;
      border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px;
    }
    #bar button.active { background: #1a73e8; border-color: #1a73e8; }
    #count { font-size: 12px; color: #bdc1c6; }

    /* Legend box */
    .legend {
      background: #fff; padding: 10px 12px; border-radius: 8px; font-size: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3); line-height: 1.6;
    }
    .legend b { display:block; margin-bottom: 4px; }
    .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  </style>
</head>
<body>
  <div id="bar">
    <div>
      <h1>🌍 QuakeScope</h1>
      <div class="sub">live earthquakes &amp; seismic-risk zones, from your own API</div>
    </div>
    <div class="controls">
      <span class="sub">show magnitude:</span>
      <button data-mag="5">M5+</button>
      <button data-mag="6" class="active">M6+</button>
      <button data-mag="7">M7+</button>
      <span id="count"></span>
    </div>
  </div>

  <div id="map"></div>

  <script src="app.js"></script>
</body>
</html>
