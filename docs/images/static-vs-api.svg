<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#202124">Two kinds of website</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#5f6368">Both answer your browser. One just hands over ready-made files; the other thinks first.</text>
  <line x1="490" y1="80" x2="490" y2="500" stroke="#dadce0" stroke-width="1"/>

  <!-- LEFT: static -->
  <text x="245" y="104" text-anchor="middle" font-size="16" font-weight="bold" fill="#137333">1.  Static website</text>
  <text x="245" y="124" text-anchor="middle" font-size="11.5" fill="#5f6368">(the kind we are about to make)</text>

  <rect x="160" y="140" width="170" height="46" rx="8" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="245" y="168" text-anchor="middle" font-size="13" font-weight="bold">Your browser</text>

  <line x1="210" y1="188" x2="210" y2="226" stroke="#5f6368" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="150" y="212" font-size="10.5" fill="#5f6368">asks</text>
  <line x1="280" y1="226" x2="280" y2="188" stroke="#5f6368" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="300" y="212" font-size="10.5" fill="#137333">sends files</text>

  <rect x="135" y="230" width="220" height="92" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="245" y="256" text-anchor="middle" font-size="13" font-weight="bold" fill="#137333">Web host (GitHub Pages)</text>
  <text x="245" y="278" text-anchor="middle" font-family="Menlo, monospace" font-size="11" fill="#202124">index.html · app.js</text>
  <text x="245" y="296" text-anchor="middle" font-family="Menlo, monospace" font-size="11" fill="#202124">quakes.json</text>
  <text x="245" y="313" text-anchor="middle" font-size="10" font-style="italic" fill="#5f6368">made ahead of time, just sit there</text>

  <text x="245" y="360" text-anchor="middle" font-size="12" fill="#202124">The host does no thinking.</text>
  <text x="245" y="380" text-anchor="middle" font-size="12" fill="#202124">Everyone gets the same files.</text>
  <text x="245" y="404" text-anchor="middle" font-size="12" font-weight="bold" fill="#137333">→ free, fast, dead simple</text>
  <text x="245" y="424" text-anchor="middle" font-size="11.5" fill="#5f6368">Great when the data doesn't change.</text>

  <!-- RIGHT: dynamic / API -->
  <text x="735" y="104" text-anchor="middle" font-size="16" font-weight="bold" fill="#b06000">2.  Site with an API</text>
  <text x="735" y="124" text-anchor="middle" font-size="11.5" fill="#5f6368">(what we built in Phase 4)</text>

  <rect x="650" y="140" width="170" height="44" rx="8" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="735" y="167" text-anchor="middle" font-size="13" font-weight="bold">Your browser</text>

  <line x1="700" y1="184" x2="700" y2="216" stroke="#5f6368" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="560" y="204" font-size="10.5" fill="#5f6368">1. ask (e.g. "M7+ near Japan")</text>

  <rect x="650" y="220" width="170" height="54" rx="8" fill="#feefc3" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="735" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5b00">FastAPI</text>

  <line x1="700" y1="274" x2="700" y2="304" stroke="#5f6368" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="715" y="293" font-size="10.5" fill="#5f6368">2. query</text>

  <rect x="650" y="308" width="170" height="50" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="735" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#137333">PostgreSQL</text>

  <!-- return arrow curving from FastAPI back up to browser -->
  <path d="M 820 247 C 905 247, 905 162, 822 162" fill="none" stroke="#5f6368" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="912" y="208" font-size="10.5" fill="#b06000" transform="rotate(90 912 208)">3. a fresh, custom answer</text>

  <text x="735" y="392" text-anchor="middle" font-size="12" fill="#202124">The server thinks for every request:</text>
  <text x="735" y="411" text-anchor="middle" font-size="12" fill="#202124">runs code, queries the DB, builds your answer.</text>
  <text x="735" y="435" text-anchor="middle" font-size="11.5" fill="#5f6368">Needed when data changes or must be filtered live.</text>

  <!-- bottom note -->
  <rect x="60" y="470" width="860" height="70" rx="10" fill="#f1f3f4" stroke="#dadce0"/>
  <text x="490" y="497" text-anchor="middle" font-size="12.5" fill="#202124">Earthquake history doesn't change, so our map can be a static site — free, with no server to keep running.</text>
  <text x="490" y="519" text-anchor="middle" font-size="12.5" fill="#202124">We still built the API to learn it, to query live / filtered data, and for its free interactive docs at /docs.</text>
</svg>
