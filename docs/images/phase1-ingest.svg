<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 660" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="660" fill="#ffffff"/>
  <text x="390" y="36" text-anchor="middle" font-size="21" font-weight="bold" fill="#202124">Phase 1 — how the ingest script works</text>
  <text x="390" y="60" text-anchor="middle" font-size="13" fill="#5f6368">Go year by year; ask USGS for that year; save the answer. Skip years we already have.</text>

  <!-- A: years -->
  <rect x="160" y="84" width="220" height="48" rx="10" fill="#d2e3fc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="270" y="113" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Years 2010 → 2026</text>

  <!-- B: for each year -->
  <rect x="160" y="160" width="220" height="48" rx="10" fill="#d2e3fc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="270" y="189" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">For each year…</text>

  <!-- Decision diamond -->
  <polygon points="270,232 372,288 270,344 168,288" fill="#feefc3" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="270" y="284" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#202124">Already</text>
  <text x="270" y="301" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#202124">downloaded?</text>

  <!-- Skip box (yes) -->
  <rect x="430" y="263" width="170" height="50" rx="10" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="515" y="284" text-anchor="middle" font-size="13" font-weight="bold" fill="#202124">Skip</text>
  <text x="515" y="302" text-anchor="middle" font-size="10.5" fill="#5f6368">use the saved file</text>

  <!-- C: request -->
  <rect x="160" y="372" width="220" height="58" rx="10" fill="#d2e3fc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="270" y="396" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Ask USGS for that year</text>
  <text x="270" y="415" text-anchor="middle" font-size="10.5" fill="#5f6368">retry up to 4× if it fails</text>

  <!-- USGS API box -->
  <rect x="500" y="367" width="200" height="68" rx="10" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="600" y="396" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">USGS Earthquake API</text>
  <text x="600" y="416" text-anchor="middle" font-size="10.5" fill="#5f6368">free, public web service</text>

  <!-- D: save -->
  <rect x="160" y="462" width="220" height="58" rx="10" fill="#d2e3fc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="270" y="486" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Save the raw answer</text>
  <text x="270" y="505" text-anchor="middle" font-size="10.5" fill="#5f6368">data/raw/earthquakes_YEAR.geojson</text>

  <!-- Result -->
  <rect x="120" y="560" width="300" height="62" rx="12" fill="#ceead6" stroke="#34a853" stroke-width="2"/>
  <text x="270" y="586" text-anchor="middle" font-size="14" font-weight="bold" fill="#137333">124,479 earthquakes saved</text>
  <text x="270" y="606" text-anchor="middle" font-size="11" fill="#5f6368">17 files · 93 MB · in data/raw/</text>

  <!-- arrows -->
  <line x1="270" y1="132" x2="270" y2="158" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="270" y1="208" x2="270" y2="230" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- yes branch -->
  <line x1="372" y1="288" x2="428" y2="288" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="280" text-anchor="middle" font-size="11" fill="#137333" font-weight="bold">yes</text>
  <!-- no branch -->
  <line x1="270" y1="344" x2="270" y2="370" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="284" y="362" text-anchor="middle" font-size="11" fill="#a50e0e" font-weight="bold">no</text>
  <!-- request <-> usgs -->
  <line x1="380" y1="396" x2="498" y2="396" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <!-- save -->
  <line x1="270" y1="430" x2="270" y2="460" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="270" y1="520" x2="270" y2="558" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- next-year loop-back arrow on the left -->
  <path d="M 160,491 C 70,491 70,184 158,184" fill="none" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="60" y="340" text-anchor="middle" font-size="11" fill="#5f6368" transform="rotate(-90 60 340)">repeat for next year</text>
</svg>
