<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 410" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1040" height="410" fill="#ffffff"/>
  <text x="520" y="32" text-anchor="middle" font-size="21" font-weight="bold" fill="#202124">Phase 2 — SQL turns messy JSON into a clean table</text>
  <text x="520" y="56" text-anchor="middle" font-size="13" fill="#5f6368">Pull each field out of the nested JSON and give it a proper type (date, number, text).</text>

  <!-- Left: raw JSON -->
  <text x="230" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#137333">raw.events — one quake as JSONB</text>
  <rect x="30" y="92" width="400" height="292" rx="10" fill="#f6f9f6" stroke="#34a853" stroke-width="1.5"/>
  <text font-family="Menlo, Consolas, monospace" font-size="13" fill="#202124">
    <tspan x="48" y="120">{</tspan>
    <tspan x="48" y="142">  "id": "official2011...Tohoku",</tspan>
    <tspan x="48" y="164">  "properties": {</tspan>
    <tspan x="48" y="186">    "mag": 9.1,</tspan>
    <tspan x="48" y="208">    "time": 1299818784120,</tspan>
    <tspan x="48" y="230">    "place": "...Tohoku, Japan",</tspan>
    <tspan x="48" y="252">    "tsunami": 0</tspan>
    <tspan x="48" y="274">  },</tspan>
    <tspan x="48" y="296">  "geometry": {</tspan>
    <tspan x="48" y="318">    "coordinates": [142.37, 38.30, 29]</tspan>
    <tspan x="48" y="340">  }</tspan>
    <tspan x="48" y="362">}</tspan>
  </text>

  <!-- Arrow -->
  <line x1="438" y1="235" x2="568" y2="235" stroke="#5f6368" stroke-width="2" marker-end="url(#a2)"/>
  <text x="503" y="222" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#4285f4">SQL: SELECT</text>
  <text x="503" y="257" text-anchor="middle" font-size="11" fill="#5f6368">extract + type</text>

  <!-- Right: clean table -->
  <text x="800" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#137333">staging.events — clean, flat columns</text>
  <!-- header -->
  <rect x="585" y="92" width="430" height="30" fill="#ceead6" stroke="#34a853" stroke-width="1"/>
  <rect x="585" y="122" width="430" height="30" fill="#ffffff" stroke="#34a853" stroke-width="1"/>
  <line x1="671" y1="92" x2="671" y2="152" stroke="#a8d5b5"/>
  <line x1="757" y1="92" x2="757" y2="152" stroke="#a8d5b5"/>
  <line x1="843" y1="92" x2="843" y2="152" stroke="#a8d5b5"/>
  <line x1="929" y1="92" x2="929" y2="152" stroke="#a8d5b5"/>
  <g font-size="10.5" font-weight="bold" fill="#137333" text-anchor="middle">
    <text x="628" y="111">time</text>
    <text x="714" y="111">magnitude</text>
    <text x="800" y="111">latitude</text>
    <text x="886" y="111">longitude</text>
    <text x="972" y="111">depth_km</text>
  </g>
  <g font-family="Menlo, Consolas, monospace" font-size="10.5" fill="#202124" text-anchor="middle">
    <text x="628" y="141">2011-03-11</text>
    <text x="714" y="141">9.1</text>
    <text x="800" y="141">38.30</text>
    <text x="886" y="141">142.37</text>
    <text x="972" y="141">29</text>
  </g>
  <text x="585" y="172" font-size="10.5" font-style="italic" fill="#5f6368">+ place, tsunami, felt_reports, significance, network …</text>

  <!-- pipeline progress -->
  <text x="585" y="212" font-size="12" font-weight="bold" fill="#202124">Pipeline so far:</text>
  <rect x="585" y="224" width="118" height="46" rx="8" fill="#ceead6" stroke="#34a853" stroke-width="1.5"/>
  <text x="644" y="244" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#137333">raw ✓</text>
  <text x="644" y="260" text-anchor="middle" font-size="9.5" fill="#5f6368">124k JSONB</text>
  <line x1="705" y1="247" x2="730" y2="247" stroke="#5f6368" stroke-width="1.5" marker-end="url(#a2)"/>
  <rect x="731" y="224" width="118" height="46" rx="8" fill="#ceead6" stroke="#34a853" stroke-width="1.5"/>
  <text x="790" y="244" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#137333">staging ✓</text>
  <text x="790" y="260" text-anchor="middle" font-size="9.5" fill="#5f6368">clean table</text>
  <line x1="851" y1="247" x2="876" y2="247" stroke="#5f6368" stroke-width="1.5" marker-end="url(#a2)"/>
  <rect x="877" y="224" width="130" height="46" rx="8" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="942" y="244" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5f6368">analytics</text>
  <text x="942" y="260" text-anchor="middle" font-size="9.5" fill="#5f6368">next: Phase 3</text>
</svg>
