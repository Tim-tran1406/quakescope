<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#202124">Phase 4 — how the API answers a request</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#5f6368">Someone asks a URL; FastAPI runs a SQL query; the database replies; FastAPI sends back JSON.</text>

  <!-- Client -->
  <rect x="40" y="165" width="175" height="120" rx="10" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="127" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Who's asking</text>
  <text x="127" y="226" text-anchor="middle" font-size="11.5" fill="#5f6368">browser</text>
  <text x="127" y="245" text-anchor="middle" font-size="11.5" fill="#5f6368">map website (Phase 5)</text>
  <text x="127" y="264" text-anchor="middle" font-size="11.5" fill="#5f6368">curl / anyone</text>

  <!-- FastAPI -->
  <rect x="375" y="118" width="250" height="235" rx="10" fill="#feefc3" stroke="#fbbc04" stroke-width="2"/>
  <text x="500" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5b00">FastAPI app (api/main.py)</text>
  <g font-family="Menlo, Consolas, monospace" font-size="12" fill="#202124">
    <text x="398" y="178">GET /quakes</text>
    <text x="398" y="202">GET /quakes/{id}</text>
    <text x="398" y="226">GET /zones/risk</text>
    <text x="398" y="250">GET /clusters</text>
    <text x="398" y="274">GET /anomalies</text>
    <text x="398" y="298">GET /stats/yearly</text>
  </g>
  <text x="500" y="330" text-anchor="middle" font-size="10.5" font-style="italic" fill="#7a5b00">+ free interactive docs at /docs</text>

  <!-- Postgres -->
  <rect x="785" y="165" width="180" height="120" rx="10" fill="#ceead6" stroke="#34a853" stroke-width="2"/>
  <text x="875" y="212" text-anchor="middle" font-size="14" font-weight="bold" fill="#137333">PostgreSQL</text>
  <text x="875" y="236" text-anchor="middle" font-size="11.5" fill="#5f6368">staging + analytics</text>

  <!-- client <-> fastapi -->
  <line x1="217" y1="205" x2="373" y2="205" stroke="#5f6368" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="295" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="#4285f4">1  GET /zones/risk</text>
  <line x1="373" y1="250" x2="217" y2="250" stroke="#5f6368" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="295" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#137333">4  JSON reply</text>

  <!-- fastapi <-> postgres -->
  <line x1="627" y1="205" x2="783" y2="205" stroke="#5f6368" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="705" y="197" text-anchor="middle" font-size="11" font-weight="bold" fill="#4285f4">2  SQL query</text>
  <line x1="783" y1="250" x2="627" y2="250" stroke="#5f6368" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="705" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#137333">3  rows</text>

  <text x="500" y="420" text-anchor="middle" font-size="12.5" fill="#202124">The database stays the single source of truth — the API just reads from it and formats the answer.</text>
</svg>
