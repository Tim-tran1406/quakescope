<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1050" height="620" fill="#ffffff"/>
  <text x="525" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#202124">QuakeScope — how data flows through the project</text>
  <text x="525" y="66" text-anchor="middle" font-size="13" fill="#5f6368">Data enters top-left, gets cleaner as it flows down, then is read by two dashboards on the right.</text>

  <!-- USGS -->
  <rect x="20" y="160" width="150" height="70" rx="10" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="95" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">USGS API</text>
  <text x="95" y="210" text-anchor="middle" font-size="11" fill="#5f6368">free, public</text>

  <!-- Ingest -->
  <rect x="200" y="160" width="150" height="70" rx="10" fill="#d2e3fc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="275" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Python — Ingest</text>
  <text x="275" y="210" text-anchor="middle" font-size="11" fill="#5f6368">fetch + clean</text>

  <!-- Postgres container -->
  <rect x="400" y="110" width="210" height="340" rx="12" fill="#ceead6" stroke="#34a853" stroke-width="2"/>
  <text x="505" y="135" text-anchor="middle" font-size="15" font-weight="bold" fill="#137333">PostgreSQL (one source of truth)</text>

  <!-- raw layer -->
  <rect x="415" y="150" width="180" height="62" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
  <text x="505" y="176" text-anchor="middle" font-size="13" font-weight="bold" fill="#202124">raw</text>
  <text x="505" y="195" text-anchor="middle" font-size="10.5" fill="#5f6368">exact copy of download</text>

  <!-- staging layer -->
  <rect x="415" y="245" width="180" height="62" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
  <text x="505" y="271" text-anchor="middle" font-size="13" font-weight="bold" fill="#202124">staging</text>
  <text x="505" y="290" text-anchor="middle" font-size="10.5" fill="#5f6368">cleaned, typed, deduped</text>

  <!-- analytics layer -->
  <rect x="415" y="340" width="180" height="62" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
  <text x="505" y="366" text-anchor="middle" font-size="13" font-weight="bold" fill="#202124">analytics</text>
  <text x="505" y="385" text-anchor="middle" font-size="10.5" fill="#5f6368">aggregates + DS results</text>

  <!-- internal arrows -->
  <line x1="505" y1="212" x2="505" y2="243" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="505" y1="307" x2="505" y2="338" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data science box -->
  <rect x="400" y="500" width="210" height="80" rx="12" fill="#d2e3fc" stroke="#4285f4" stroke-width="1.5"/>
  <text x="505" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Python — Data Science</text>
  <text x="505" y="550" text-anchor="middle" font-size="10.5" fill="#5f6368">DBSCAN · b-value</text>
  <text x="505" y="566" text-anchor="middle" font-size="10.5" fill="#5f6368">anomalies · risk score</text>
  <!-- DS double arrow to analytics -->
  <line x1="505" y1="500" x2="505" y2="404" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="650" y="470" text-anchor="middle" font-size="10" fill="#5f6368">reads staging, writes analytics</text>

  <!-- FastAPI -->
  <rect x="660" y="300" width="160" height="70" rx="10" fill="#feefc3" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="740" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">FastAPI</text>
  <text x="740" y="350" text-anchor="middle" font-size="11" fill="#5f6368">REST API</text>

  <!-- Web map -->
  <rect x="870" y="300" width="160" height="70" rx="10" fill="#feefc3" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="950" y="326" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Web Map</text>
  <text x="950" y="346" text-anchor="middle" font-size="11" fill="#5f6368">interactive site (Leaflet)</text>

  <!-- Power BI -->
  <rect x="660" y="410" width="160" height="70" rx="10" fill="#f3d9fa" stroke="#a142f4" stroke-width="1.5"/>
  <text x="740" y="436" text-anchor="middle" font-size="14" font-weight="bold" fill="#202124">Power BI</text>
  <text x="740" y="456" text-anchor="middle" font-size="11" fill="#5f6368">BI dashboard (Phase 6)</text>

  <!-- flow arrows -->
  <line x1="170" y1="195" x2="198" y2="195" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="184" y="185" text-anchor="middle" font-size="10" fill="#5f6368">fetch</text>

  <line x1="350" y1="195" x2="398" y2="180" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="170" text-anchor="middle" font-size="10" fill="#5f6368">load raw</text>

  <line x1="595" y1="371" x2="658" y2="335" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="595" y1="371" x2="658" y2="440" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="820" y1="335" x2="868" y2="335" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="844" y="325" text-anchor="middle" font-size="10" fill="#5f6368">JSON</text>
</svg>
